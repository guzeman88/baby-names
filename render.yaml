services:
  - type: web
    name: babynames-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: babynames-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: babynames-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend.app

databases:
  - name: babynames-db
    databaseName: babyname
    user: babyname

redis:
  - name: babynames-redis
    maxmemoryPolicy: allkeys-lru
