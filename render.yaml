services:
  - type: web
    name: babynames-api
    runtime: node
    plan: free
    buildCommand: npm install && cd apps/api && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: babynames-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://shrimpyapp.vercel.app


databases:
  - name: babynames-db
    databaseName: babyname
    user: babyname
    plan: free
