services:
  - type: web
    name: babynames-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && cd packages/data-pipeline && npm install --include=dev && cd ../../apps/api && npx prisma generate && npm run build
    startCommand: cd apps/api && npx prisma migrate deploy && npx tsx scripts/maybe-run-pipeline.ts && npx tsx prisma/seed.ts && node dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: babynames-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://shrimpyapp.vercel.app


databases:
  - name: babynames-db
    databaseName: babyname
    user: babyname
    plan: free
