name: Keep Render Warm

on:
  schedule:
    # Every 5 minutes — Render free tier sleeps after ~15 min of inactivity
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 https://babynames-api.onrender.com/v1/health || echo "timeout")
          echo "Health check status: $response"
