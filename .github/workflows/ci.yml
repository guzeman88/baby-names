name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Type check (API)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type check (Mobile)
        run: npx tsc --noEmit
        working-directory: apps/mobile

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: babyname
          POSTGRES_PASSWORD: babyname
          POSTGRES_DB: babyname
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://babyname:babyname@localhost:5432/babyname
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-32chars-xxxxxxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-32chars-xxxxxxx
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      PORT: 3001
      NODE_ENV: test
      FRONTEND_URL: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Run API tests
        run: npm test
        working-directory: apps/api
