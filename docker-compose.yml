services:
  postgres:
    image: postgres:16-alpine
    container_name: babyname-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with any native Postgres on 5432
    environment:
      POSTGRES_USER: babyname
      POSTGRES_PASSWORD: babyname
      POSTGRES_DB: babyname
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babyname"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: babyname-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
